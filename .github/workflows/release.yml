name: Publish Docker image and GitHub release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/iwanna-gm8-web-engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate release version
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          actual="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"

          if [[ "$actual" != "$version" ]]; then
            echo "::error::Tag $TAG_NAME does not match Cargo workspace version $actual"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes_dir="$RUNNER_TEMP/iwanna-release-notes"
          mkdir -p "$notes_dir"

          extract_section() {
            local file="$1"
            awk -v heading="## [$VERSION]" '
              $0 == heading || index($0, heading " -") == 1 { in_section=1; start=NR }
              in_section && NR > start && /^## \[/ { exit }
              in_section { print }
            ' "$file"
          }

          for file in CHANGELOG.md CHANGELOG.zh-CN.md; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing $file"
              exit 1
            fi
          done

          extract_section CHANGELOG.md > "$notes_dir/en.md"
          extract_section CHANGELOG.zh-CN.md > "$notes_dir/zh-CN.md"

          for file in "$notes_dir/en.md" "$notes_dir/zh-CN.md"; do
            if [[ ! -s "$file" ]]; then
              echo "::error::Missing CHANGELOG section for version $VERSION"
              exit 1
            fi
          done

          {
            cat "$notes_dir/en.md"
            printf '\n---\n\n'
            cat "$notes_dir/zh-CN.md"
          } > "$notes_dir/release.md"

          echo "file=$notes_dir/release.md" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file "$NOTES_FILE"
          fi
